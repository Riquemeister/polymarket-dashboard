<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PolyRique">
<meta name="theme-color" content="#07090f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>PolyRique</title>
<style>
  :root{
    --bg:#07090f; --panel:#0d1017; --panel2:#111520; --line:#1c2333;
    --text:#e8ecf4; --muted:#6b7a99; --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --blue:#3b82f6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
  body{position:fixed;inset:0;color:var(--text)}
  .app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}

  .topbar{
    height:58px; padding:0 14px; padding-top:env(safe-area-inset-top);
    display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(180deg, rgba(13,16,23,.98), rgba(13,16,23,.92));
    border-bottom:1px solid rgba(28,35,51,.95);
    box-shadow:0 8px 28px rgba(0,0,0,.22);
    flex:0 0 auto;
  }
  .brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800;letter-spacing:-.3px}
  .brand img{width:28px;height:28px;border-radius:8px;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 10px 24px rgba(34,197,94,.12)}
  .brand span{color:var(--green)}
  .brand-sub{font-size:11px;font-weight:600;color:var(--muted);margin-top:1px}
  .brand-wrap{display:flex;flex-direction:column;line-height:1.05}

  .actions{display:flex;align-items:center;gap:8px}
  .live{
    display:inline-flex;align-items:center;gap:7px;
    background:rgba(17,21,32,.95); border:1px solid rgba(28,35,51,.95);
    padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700;color:var(--muted)
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,.12);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.7);opacity:.55}}

  .open-btn{
    display:inline-flex;align-items:center;gap:7px;
    background:linear-gradient(135deg,#118ab2,#06d6a0);
    color:#fff;border:none;border-radius:999px;
    padding:9px 14px;font-size:11px;font-weight:800;cursor:pointer;
    box-shadow:0 10px 28px rgba(17,138,178,.28);
  }
  .open-btn:active{transform:scale(.98)}

  .iframe-wrap{flex:1 1 auto; position:relative; min-height:0; background:var(--bg)}
  iframe{position:absolute; inset:0; width:100%; height:100%; border:0; background:var(--bg)}
  .footer-glow{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:12px; font-size:10px; color:rgba(255,255,255,.18);
    letter-spacing:.3px; pointer-events:none; user-select:none;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <img src="icon.png" alt="PolyRique">
        <div class="brand-wrap">
          <div>Poly<span>Rique</span></div>
          <div class="brand-sub">Intelligence Dashboard</div>
        </div>
      </div>
      <div class="actions">
        <div class="live"><span class="dot"></span> LIVE</div>
        <button class="open-btn" onclick="window.open('https://polymarket-dashboard-djtge9o32qqxzyyz9plbe9.streamlit.app','_blank')">Abrir app ↗</button>
      </div>
    </div>
    <div class="iframe-wrap">
      <iframe src="https://polymarket-rique.streamlit.app" allow="clipboard-read; clipboard-write"></iframe>
      <div class="footer-glow">PolyRique Intelligence</div>
    </div>
  </div>
</body>
</html>
