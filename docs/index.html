<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Polymarket">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;
    background:#0a1628;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
    overflow:hidden;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* SPLASH */
  #splash{
    position:fixed;inset:0;
    background:linear-gradient(160deg,#0a1628 0%,#0d2040 55%,#0a1a30 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;
  }

  .logo-wrap{
    width:100px;height:100px;border-radius:24px;
    background:linear-gradient(135deg,#118ab2 0%,#06d6a0 100%);
    display:flex;align-items:center;justify-content:center;
    font-size:52px;
    box-shadow:0 8px 40px #118ab260;
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 8px 40px #118ab240;transform:scale(1)}
    50%{box-shadow:0 12px 56px #118ab280;transform:scale(1.04)}
  }

  .app-name{font-size:1.7rem;font-weight:800;color:#e0e6ef;letter-spacing:-.5px;text-align:center}
  .app-sub{font-size:.82rem;color:#556688;text-align:center;line-height:1.6}

  /* BARRA DE PROGRESSO */
  .progress-wrap{width:200px;height:3px;background:#1a2a3a;border-radius:3px;overflow:hidden;margin-top:4px}
  .progress-bar{
    height:3px;width:0%;border-radius:3px;
    background:linear-gradient(90deg,#118ab2,#06d6a0);
    transition:width .1s linear;
  }
  .progress-text{font-size:.7rem;color:#334466;margin-top:6px;text-align:center;min-height:16px}

  /* BOTÃO MANUAL (caso o redirect automático não funcione) */
  .open-btn{
    background:linear-gradient(135deg,#118ab2,#06d6a0);
    color:#fff;border:none;border-radius:16px;
    padding:15px 40px;font-size:1rem;font-weight:700;
    cursor:pointer;box-shadow:0 4px 24px #118ab250;
    -webkit-tap-highlight-color:transparent;
    display:none;margin-top:8px;
  }
  .open-btn:active{transform:scale(.97);transition:transform .1s}

  .version{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));
    font-size:.62rem;color:#1e2a3a;text-align:center;width:100%}
</style>
</head>
<body>
<div id="splash">
  <div class="logo-wrap"><img src="icon.png" style="width:72px;height:72px;border-radius:16px" alt="Polymarket"></div>
  </div>
  <div style="text-align:center">
    <div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
    <div class="progress-text" id="msg">A preparar…</div>
  </div>
  <button class="open-btn" id="btn" onclick="goNow()">Abrir Dashboard →</button>
</div>

<div class="version">Polymarket Intelligence v1.0</div>

<script>
  // ─── URL DO TEU STREAMLIT (substitui pelo teu link real) ─────────────────
  const APP_URL = 'https://polymarket-dashboard-djtge9o32qqxzyyz9plbe9.streamlit.app';
  // ─────────────────────────────────────────────────────────────────────────

  const bar = document.getElementById('bar');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');

  const steps = [
    [15,  300, 'A verificar ligação…'],
    [40,  700, 'A carregar mercados…'],
    [70, 1200, 'A preparar análise IA…'],
    [90, 1700, 'Quase pronto…'],
    [100,2000, 'A abrir dashboard! ✓'],
  ];

  steps.forEach(([pct, delay, text]) => {
    setTimeout(() => {
      bar.style.width = pct + '%';
      msg.textContent = text;
    }, delay);
  });

  // Mostrar botão manual após 2.5s (fallback)
  setTimeout(() => { btn.style.display = 'block'; }, 2500);

  // Redirect automático após 2.2s
  setTimeout(goNow, 2200);

  function goNow() {
    window.location.href = APP_URL;
  }

  // Ícone já embutido como base64 no <head>
</script>
</body>
</html>
